name: secret-scan

on:
  pull_request:
  push:
    branches: [main]
  schedule:
    - cron: '0 6 * * 1'

concurrency:
  group: secret-scan-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  gitleaks:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Install gitleaks
        env:
          GITLEAKS_VERSION: 8.21.2
        run: |
          set -euo pipefail
          curl -sSL -o /tmp/gitleaks.tar.gz \
            "https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz"
          tar -xzf /tmp/gitleaks.tar.gz -C /tmp gitleaks
          sudo mv /tmp/gitleaks /usr/local/bin/gitleaks
          gitleaks version

      - name: Run gitleaks
        run: |
          set -euo pipefail
          args=(
            --source .
            --config .gitleaks.toml
            --redact
            --verbose
          )
          case "${{ github.event_name }}" in
            pull_request)
              args+=(--log-opts "${{ github.event.pull_request.base.sha }}..${{ github.event.pull_request.head.sha }}")
              ;;
            push)
              # github.event.before is the commit main was at before this push.
              # On initial push of a branch it is 40 zeros — fall back to HEAD~1.
              BEFORE="${{ github.event.before }}"
              if [ "$BEFORE" = "0000000000000000000000000000000000000000" ]; then
                BEFORE=$(git rev-parse HEAD~1 2>/dev/null || git rev-parse HEAD)
              fi
              args+=(--log-opts "${BEFORE}..${{ github.sha }}")
              ;;
            schedule|workflow_dispatch)
              # Full history scan as the periodic integrity check.
              ;;
          esac
          gitleaks detect "${args[@]}"
